<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="shortcut icon" href="./JEMA-BRY.jpg" type="image/x-icon" />
    <title>Teste de sanidade para DEVs</title>
  </head>
  <body>
    <header>
      <h1>TESTE DE SANIDADE</h1>
    </header>
    <main class="container">
      <p class="instruction">
        Responda as questões com sinceridade como você se identifica ou tem o desejo de se
        identificar no futuro:
      </p>
      <div class="question">
        <p>Frontend:</p>
        <label class="switch">
          <input type="checkbox" class="front" onclick="onFront()" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="question">
        <p>Backend:</p>
        <label class="switch">
          <input type="checkbox" class="back" onclick="onBack()" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="question">
        <p>Ter saúde mental:</p>
        <label class="switch">
          <input type="checkbox" class="sanidade" onclick="onSanidade()" />
          <span class="slider"></span>
        </label>
      </div>
    </main>
    <footer class="contato">
      <div class="redes">
        <a href="https://github.com/LeandroDevLab" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="http://linkedin.com/in/leandrosoribeiro" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-linkedin"></i>
        </a>
        <a
          href="https://wa.me/5593996167815?text=Ol%C3%A1%20Leandro%20Oliota%2C%20estou%20entrando%20em%20contato%20atrav%C3%A9s%20de%20um%20projeto%20que%20achei%20interessante%21"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-square-whatsapp"></i>
        </a>
      </div>
      <p>Leandro Oliota</p>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
